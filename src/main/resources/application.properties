# Railway sets PORT automatically — fallback to 3002 for local dev
server.port=${PORT:10000}
spring.jmx.enabled=false
spring.main.lazy-initialization=true

# JWT — override JWT_SECRET in Railway environment variables
app.jwt.secret=${JWT_SECRET:ba043cd6fdc58ecff7df8789724585644862e3b6836915fa92daaf4cdf4d5e0dd2a5aa9f9dccda0032a6a4a7b684d6c434d7108f60eb4a76c52faca96e18f405}
app.jwt.expiry-hours=8

# Admin password — override ADMIN_PASSWORD in Railway environment variables
app.admin.password=${ADMIN_PASSWORD:admin123}

# API Key — every request from the portfolio must include X-API-Key header
app.api-key=${API_KEY:dev-key-change-in-production}

# hCaptcha — override HCAPTCHA_SECRET in Railway environment variables
# Test secret (always passes): 0x0000000000000000000000000000000000000000
app.hcaptcha.secret=${HCAPTCHA_SECRET:0x0000000000000000000000000000000000000000}

# CORS — override ALLOWED_ORIGINS in Railway environment variables
app.cors.allowed-origins=${ALLOWED_ORIGINS:http://localhost:5173,https://zinbohtetaung.com,https://*.vercel.app}

# Email — set MAIL_USERNAME and MAIL_PASSWORD in Railway env vars
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000
app.mail.to=${MAIL_USERNAME:}
